<svg width="1980" height="1080" viewBox="0 0 1980 1080" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1980" y2="1080" gradientUnits="userSpaceOnUse">
    <stop stop-color="#07182A"/>
    <stop offset="1" stop-color="#0D2945"/>
  </linearGradient>

  <linearGradient id="accent" x1="1200" y1="0" x2="1980" y2="1080" gradientUnits="userSpaceOnUse">
    <stop stop-color="#A5D549" stop-opacity="0.18"/>
    <stop offset="1" stop-color="#A5D549" stop-opacity="0"/>
  </linearGradient>
</defs>

<!-- BACKGROUND -->
<rect width="1980" height="1080" fill="url(#bg)"/>
<rect width="1980" height="1080" fill="url(#accent)"/>

<!-- TOP GREEN LINE -->
<rect width="1980" height="10" fill="#A5D549"/>

<!-- BRAND -->
<g transform="translate(120 90)">
  <rect width="54" height="54" rx="12" fill="#A5D549"/>

  <path d="M16 18H38M16 27H34M16 36H30"
        stroke="#07182A"
        stroke-width="4"
        stroke-linecap="round"/>

  <text x="75" y="27"
        font-family="DM Sans, Roboto, Arial, sans-serif"
        font-size="28"
        font-weight="700"
        fill="#FFFFFF">
    BTW GROUP
  </text>

  <text x="75" y="51"
        font-family="DM Sans, Roboto, Arial, sans-serif"
        font-size="16"
        font-weight="600"
        letter-spacing="4"
        fill="#A5D549">
    CAREERS
  </text>
</g>

<!-- YEAR BADGE -->
<g transform="translate(1660 95)">
  <rect width="200" height="52" rx="26"
        fill="#FFFFFF"
        fill-opacity="0.08"
        stroke="#FFFFFF"
        stroke-opacity="0.15"/>

  <text x="100" y="34"
        text-anchor="middle"
        font-family="DM Sans, Roboto, Arial, sans-serif"
        font-size="21"
        font-weight="700"
        fill="#FFFFFF">
    CAREERS 2026
  </text>
</g>

<!-- MAIN CONTENT -->
<g transform="translate(120 280)">

  <!-- SMALL LABEL -->
  <text x="0" y="0"
        font-family="DM Sans, Roboto, Arial, sans-serif"
        font-size="25"
        font-weight="700"
        letter-spacing="4"
        fill="#A5D549">
    CAREER OPPORTUNITIES
  </text>

  <!-- TITLE -->
  <text x="0" y="135"
        font-family="DM Sans, Roboto, Arial, sans-serif"
        font-size="92"
        font-weight="700"
        letter-spacing="-2"
        fill="#FFFFFF">
    Visa and Travel
  </text>

  <text x="0" y="240"
        font-family="DM Sans, Roboto, Arial, sans-serif"
        font-size="92"
        font-weight="700"
        letter-spacing="-2"
        fill="#FFFFFF">
    Industry Careers
  </text>

  <text x="0" y="345"
        font-family="DM Sans, Roboto, Arial, sans-serif"
        font-size="92"
        font-weight="700"
        letter-spacing="-2"
        fill="#A5D549">
    in 2026
  </text>

  <!-- SUBTITLE -->
  <text x="0" y="435"
        font-family="Roboto, Arial, sans-serif"
        font-size="31"
        font-weight="400"
        fill="#C8D4DF">
    Job Opportunities in Thane and Navi Mumbai
  </text>

  <!-- LOCATION -->
  <g transform="translate(0 510)">

    <!-- THANE -->
    <rect width="205" height="70" rx="35"
          fill="#FFFFFF"
          fill-opacity="0.08"
          stroke="#FFFFFF"
          stroke-opacity="0.15"/>

    <circle cx="38" cy="35" r="8" fill="#A5D549"/>

    <text x="65" y="44"
          font-family="DM Sans, Roboto, Arial, sans-serif"
          font-size="25"
          font-weight="700"
          fill="#FFFFFF">
      THANE
    </text>

    <!-- CONNECTING LINE -->
    <path d="M235 35H305"
          stroke="#A5D549"
          stroke-width="3"
          stroke-linecap="round"/>

    <!-- NAVI MUMBAI -->
    <rect x="335" width="300" height="70" rx="35"
          fill="#A5D549"/>

    <circle cx="375" cy="35" r="8" fill="#07182A"/>

    <text x="402" y="44"
          font-family="DM Sans, Roboto, Arial, sans-serif"
          font-size="25"
          font-weight="700"
          fill="#07182A">
      NAVI MUMBAI
    </text>

  </g>

</g>

<!-- RIGHT DECORATIVE VISUAL -->
<g transform="translate(1360 320)">

  <!-- OUTER CIRCLE -->
  <circle cx="250" cy="250" r="250"
          fill="#FFFFFF"
          fill-opacity="0.04"
          stroke="#FFFFFF"
          stroke-opacity="0.08"
          stroke-width="2"/>

  <!-- INNER CIRCLE -->
  <circle cx="250" cy="250" r="175"
          fill="#A5D549"
          fill-opacity="0.08"
          stroke="#A5D549"
          stroke-opacity="0.35"
          stroke-width="2"/>

  <!-- GLOBE -->
  <circle cx="250" cy="250" r="105"
          fill="none"
          stroke="#A5D549"
          stroke-width="6"/>

  <ellipse cx="250" cy="250"
           rx="45"
           ry="105"
           fill="none"
           stroke="#A5D549"
           stroke-width="5"/>

  <path d="M145 250H355"
        stroke="#A5D549"
        stroke-width="5"/>

  <path d="M165 195H335"
        stroke="#A5D549"
        stroke-width="5"/>

  <path d="M165 305H335"
        stroke="#A5D549"
        stroke-width="5"/>

</g>

<!-- BOTTOM -->
<g transform="translate(120 950)">

  <rect width="1740" height="1"
        fill="#FFFFFF"
        fill-opacity="0.15"/>

  <text x="0" y="58"
        font-family="Roboto, Arial, sans-serif"
        font-size="21"
        fill="#FFFFFF"
        fill-opacity="0.55">
    Explore opportunities. Build skills. Grow your career.
  </text>

  <text x="1740" y="58"
        text-anchor="end"
        font-family="DM Sans, Roboto, Arial, sans-serif"
        font-size="21"
        font-weight="700"
        fill="#A5D549">
    BTW GROUP CAREERS
  </text>

</g>

</svg>