    </filter>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1080" height="1080" fill="#FFFFFF"/>

  <!-- ==================================================
       HEADER
  =================================================== -->
  <rect x="0" y="0" width="1080" height="8" fill="#A5D549"/>

  <text x="70" y="72"
        class="dm"
        font-size="26"
        font-weight="800"
        fill="#0A1628">
    BTW VISA SERVICES
  </text>

  <text x="70" y="102"
        class="roboto"
        font-size="12"
        font-weight="600"
        letter-spacing="3"
        fill="#77838E">
    PROFESSIONAL VISA SERVICES SINCE 2011
  </text>

  <!-- MILESTONE -->
  <text x="1010" y="70"
        text-anchor="end"
        class="dm"
        font-size="24"
        font-weight="700"
        fill="#0A1628">
    15 YEARS
  </text>

  <text x="1010" y="100"
        text-anchor="end"
        class="roboto"
        font-size="13"
        font-weight="600"
        letter-spacing="2"
        fill="#7FAE2F">
    2011 — 2026
  </text>

  <line x1="70" y1="140" x2="1010" y2="140"
        stroke="#E1E5E8"
        stroke-width="1"/>

  <!-- ==================================================
       HERO
  =================================================== -->
  <text x="70" y="215"
        class="roboto"
        font-size="14"
        font-weight="700"
        letter-spacing="5"
        fill="#7FAE2F">
    COMPANY ANNOUNCEMENT
  </text>

  <text x="70" y="310"
        class="dm"
        font-size="68"
        font-weight="700"
        fill="#0A1628">
    15 Years of Excellence.
  </text>

  <text x="70" y="390"
        class="dm"
        font-size="68"
        font-weight="700"
        fill="#8AB936">
    Expanding Our Presence.
  </text>

  <text x="75" y="455"
        class="roboto"
        font-size="22"
        font-weight="400"
