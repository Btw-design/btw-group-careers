    </text>

    <!-- NAVI MUMBAI -->
    <rect x="555"
          y="735"
          width="455"
          height="135"
          rx="8"
          fill="#F5F7F3"/>

    <rect x="555"
          y="735"
          width="6"
          height="135"
          fill="#A5D549"/>

    <text x="595" y="780"
          class="roboto"
          font-size="12"
          font-weight="700"
          letter-spacing="3"
          fill="#7FAE2F">
