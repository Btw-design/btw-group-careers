          height="145"
          rx="8"
          fill="#0A1628"/>

    <rect x="70"
          y="550"
          width="8"
          height="145"
          fill="#A5D549"/>

    <text x="120" y="600"
          class="roboto"
          font-size="13"
          font-weight="700"
          letter-spacing="4"
