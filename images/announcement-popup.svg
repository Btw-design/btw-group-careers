<svg xmlns="http://www.w3.org/2000/svg"
     width="1080"
     height="1080"
     viewBox="0 0 1080 1080">

  <defs>
    <style>
      .dm { font-family: "DM Sans", Arial, sans-serif; }
      .roboto { font-family: "Roboto", Arial, sans-serif; }
    </style>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
